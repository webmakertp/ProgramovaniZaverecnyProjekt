version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: gametracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gametracker
      POSTGRES_PASSWORD: gametracker123
      POSTGRES_DB: gametracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

volumes:
  pgdata:
